name: Deploy Azure Function - exportfindin

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt --target=".python_packages/lib/site-packages"

      - name: Deploy exactly from GitHub
        uses: Azure/functions-action@v1
        with:
          app-name: 'exportfindin'
          package: '.'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_3E85A362775E473C90D248EFEA2FD480 }}
          sku: 'flexconsumption'
          remote-build: true
        
